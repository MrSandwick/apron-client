<!-- Sticky top bar, translucent over the page background -->
<header
  class="sticky top-0 z-50 border-b border-brand-amber/15 bg-brand-bg/92 backdrop-blur"
>
  <div class="mx-auto flex h-16 max-w-[1280px] items-center justify-between px-6">
    <!-- Brand: logo mark links home -->
    <a routerLink="/home" (click)="closeMenu()" class="flex items-center gap-2.5">
      <img src="images/logo-mark.svg" alt="" aria-hidden="true" class="size-9" />
      <span class="font-display text-[20px] tracking-[-0.2px] text-brand-amber">Ahjoomah's</span>
    </a>

    <!-- Primary page links (desktop); collapses into the mobile menu below md -->
    <nav aria-label="Primary" class="hidden items-center gap-7 md:flex">
      <a
        routerLink="/home"
        routerLinkActive="text-brand-amber!"
        [routerLinkActiveOptions]="{ exact: true }"
        class="font-sans text-[14px] text-brand-cream/65 transition-colors hover:text-brand-cream"
      >
        Home
      </a>
      <a
        routerLink="/menu"
        routerLinkActive="text-brand-amber!"
        class="font-sans text-[14px] text-brand-cream/65 transition-colors hover:text-brand-cream"
      >
        Menu
      </a>
    </nav>

    <!-- Actions: reservation CTA (desktop), cart (always), and the mobile menu toggle -->
    <div class="flex items-center gap-3">
      <a
        routerLink="/reserve"
        class="hidden rounded-full bg-brand-amber px-6 py-2.5 font-display text-[14px] text-brand-bg transition-colors hover:bg-brand-amber/90 md:inline-block"
      >
        Reservations
      </a>
      <a
        routerLink="/order"
        aria-label="Cart"
        class="flex size-10 items-center justify-center rounded-full border border-brand-amber/15 text-brand-cream/70 transition-colors hover:border-brand-amber/40 hover:text-brand-cream"
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          aria-hidden="true"
          class="size-[18px]"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M2.25 3h1.386c.51 0 .955.343 1.087.836l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
          />
        </svg>
      </a>

      <!-- Mobile menu toggle: hamburger when closed, close icon when open -->
      <button
        type="button"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="mobile-menu"
        aria-label="Toggle menu"
        class="flex size-10 items-center justify-center rounded-full border border-brand-amber/15 text-brand-cream/70 transition-colors hover:border-brand-amber/40 hover:text-brand-cream md:hidden"
      >
        @if (menuOpen()) {
          <!-- Close icon -->
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            aria-hidden="true"
            class="size-5"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 6l12 12M18 6L6 18" />
          </svg>
        } @else {
          <!-- Hamburger icon -->
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            aria-hidden="true"
            class="size-5"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M4 12h16M4 17h16" />
          </svg>
        }
      </button>
    </div>
  </div>

  <!-- Mobile menu: page links + reservation CTA, revealed by the toggle -->
  @if (menuOpen()) {
    <div id="mobile-menu" class="border-t border-brand-amber/15 px-6 py-4 md:hidden">
      <nav aria-label="Primary" class="flex flex-col">
        <a
          routerLink="/home"
          routerLinkActive="text-brand-amber!"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()"
          class="py-3 font-sans text-[15px] text-brand-cream/75 transition-colors hover:text-brand-cream"
        >
          Home
        </a>
        <a
          routerLink="/menu"
          routerLinkActive="text-brand-amber!"
          (click)="closeMenu()"
          class="py-3 font-sans text-[15px] text-brand-cream/75 transition-colors hover:text-brand-cream"
        >
          Menu
        </a>
      </nav>
      <a
        routerLink="/reserve"
        (click)="closeMenu()"
        class="mt-3 block rounded-full bg-brand-amber px-6 py-3 text-center font-display text-[15px] text-brand-bg transition-colors hover:bg-brand-amber/90"
      >
        Reservations
      </a>
    </div>
  }
</header>
